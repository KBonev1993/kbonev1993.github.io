<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer X - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Header Section -->
        <div class="header-wrapper">
            <div class="header-logo-wrapper">
                <img src="https://example.com/logo.svg" alt="Developer X Logo" class="header-logo">
            </div>
            <ul class="header-nav-menu-list">
                <li><a href="index.html" class="header-nav-link">Home</a></li>
                <li><a href="about.html" class="header-nav-link">About</a></li>
                <li><a href="portfolio.html" class="header-nav-link">Portfolio</a></li>
                <li><a href="certificates.html" class="header-nav-link">Certificates</a></li>
                <li><a href="contact.html" class="header-nav-link">Contact</a></li>
            </ul>
        </div>

        <!-- Hero Section with Blackout -->
        <div class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2>Welcome to My Developer Portfolio</h2>
                <p>Discover my skills and projects</p>
            </div>
        </div>

        <!-- Footer Section -->
        <footer>
            <p>© 2024 Kristiyan Bonev | All Rights Reserved</p>
        </footer>
    </div>

    <script>
        // Header sticky behavior on scroll
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.header-wrapper');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
